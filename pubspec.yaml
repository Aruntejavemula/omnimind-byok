name: omnimind_byok
description: Premium BYOK AI chat app with direct provider usage and Supabase sync.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  dio: ^5.4.3
  flutter_secure_storage: ^9.2.2
  supabase_flutter: ^2.5.9
  flutter_markdown: ^0.7.3
  google_fonts: ^6.2.1
  intl: ^0.19.0
  uuid: ^4.4.0
  crypto: ^3.0.3
  shared_preferences: ^2.2.3
  url_launcher: ^6.3.0
  file_picker: ^8.1.2
  path_provider: ^2.1.4
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  lottie: ^3.1.2
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/mascot.json
    - assets/images/sky_clouds.png
    - assets/icons/providers/anthropic.png
    - assets/icons/providers/deepseek.png
    - assets/icons/providers/google.png
    - assets/icons/providers/groq.png
    - assets/icons/providers/kimi.png
    - assets/icons/providers/mistral.png
    - assets/icons/providers/ollama.png
    - assets/icons/providers/openai.png
    - assets/icons/providers/openrouter.png
